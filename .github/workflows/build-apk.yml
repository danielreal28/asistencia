name: Compilar APK con Capacitor

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite activar la compilación manualmente desde la web de GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio en el servidor de GitHub
      - name: Descargar Código Fuente
        uses: actions/checkout@v4

      # 2. Configurar Node.js para Capacitor
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Instalar las dependencias del proyecto
      - name: Instalar Dependencias de Node
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      # 4. Instalar Java (obligatorio para compilar Android)
      - name: Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 5. Construir el cascarón de Android de Capacitor otorgando permisos previos
      - name: Inicializar Plataforma Android
        run: |
          rm -rf android
          chmod +x ./node_modules/.bin/cap
          npx cap add android
          npx cap sync

      # 6. Compilar el APK usando Gradle en modo Debug
      - name: Compilar APK con Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 7. Subir el APK resultante a GitHub para que lo puedas descargar
      - name: Subir APK Terminado
        uses: actions/upload-artifact@v4
        with:
          name: AsistenciaIDA-Digital-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk