<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Control de Asistencia de IDA</title>
    <style>
        /* [ ... MANTIENE TUS ESTILOS ANTERIORES Y AGREGA ESTOS ... ] */
        
        .instrucciones-ui {
            font-size: 0.7rem;
            color: #6c757d;
            background: #f8f9fa;
            padding: 4px 8px;
            border-radius: 8px;
            margin: 8px 0;
            text-align: center;
            border: 1px dashed #dee2e6;
        }

        .btn-cerrar-dia {
            width: 100%;
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 8px;
            cursor: pointer;
        }

        .cell-dia.bloqueada {
            background-color: #e9ecef !important;
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="app-subletra">Control de Asistencia</div>
        <h1 class="empresa-titulo">IDA</h1>
        <div class="instrucciones-ui">
            💡 Mantén presionado cualquier día para editarlo.
        </div>
        <div class="navegador-meses">
            <button class="btn-nav" onclick="cambiarMes(-1)">‹</button>
            <div class="mes-titulo" id="nombre-mes-año">...</div>
            <button class="btn-nav" onclick="cambiarMes(1)">›</button>
        </div>
    </header>

    <div class="resumen-fijo">
        <button class="btn-cerrar-dia" onclick="bloquearDiaActual()">Cerrar día actual</button>

        <div class="panel-pantalla-final">
            </div>
    </div>

    <script>
        // ... (Tu lógica anterior) ...

        // NUEVA FUNCIÓN DE BLOQUEO
        function bloquearDiaActual() {
            const hoy = new Date();
            if (mesSeleccionado !== hoy.getMonth() || añoSeleccionado !== hoy.getFullYear()) {
                alert("Solo puedes bloquear días del mes actual.");
                return;
            }

            const celda = document.querySelector(`.cell-dia[data-dia="${hoy.getDate()}"]`);
            if (celda) {
                celda.classList.add('bloqueada');
                celda.dataset.bloqueado = "true";
                // Guardamos el estado de bloqueo en la base de datos
                calcularMatematica();
                alert("Día bloqueado exitosamente.");
            }
        }

        // Modificar cargarDatosGuardados para inyectar el bloqueo
        function inyectarEstructura(datos) {
            // ... (dentro de tu función inyectarEstructura) ...
            Object.keys(datos).forEach(dia => {
                const celda = document.querySelector(`.cell-dia[data-dia="${dia}"]`);
                if (celda) {
                    celda.dataset.clics = datos[dia].clics || 0;
                    if (datos[dia].bloqueado) {
                        celda.classList.add('bloqueada');
                        celda.dataset.bloqueado = "true";
                    }
                    // ...
                }
            });
        }
        
        // Ajustar calcularMatematica para guardar el estado 'bloqueado'
        // En el bucle de celdasReales, agrega:
        // paqueteParaGuardar[dia] = { clics, feriado: esFeriado, bloqueado: celda.dataset.bloqueado === "true" };

    </script>
</body>
</html>
